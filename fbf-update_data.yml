name: Actualizar datos FBF

on:
  schedule:
    - cron: "0,30 * * * *"   # cada 30 minutos
  workflow_dispatch:           # también se puede correr manualmente

jobs:
  fetch:
    runs-on: ubuntu-latest

    permissions:
      contents: write          # necesario para hacer commit del CSV

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests pandas

      - name: Correr fetch_data.py
        env:
          FALABELLA_USER_ID: ${{ secrets.FALABELLA_USER_ID }}
          FALABELLA_API_KEY: ${{ secrets.FALABELLA_API_KEY }}
        run: python fetch_data.py

      - name: Commit y push del CSV
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.csv
          git diff --cached --quiet || git commit -m "data: actualización automática $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
